<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Yeh Sheng</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px; max-width: 600px; }
        h1 { font-size: 120px; font-weight: 700; color: #C5A059; margin-bottom: 20px; }
        h2 { font-size: 32px; color: #333; margin-bottom: 20px; }
        p { font-size: 18px; color: #666; margin-bottom: 40px; line-height: 1.6; }
        .buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        a { display: inline-block; padding: 14px 32px; border-radius: 6px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
        .btn-primary { background-color: #C5A059; color: white; }
        .btn-primary:hover { background-color: #b08d4d; transform: translateY(-2px); }
        .btn-secondary { background-color: white; color: #333; border: 2px solid #C5A059; }
        .btn-secondary:hover { background-color: #f5f5f5; }
        .logo { margin-bottom: 40px; }
        .logo img { height: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="images/logo.png" alt="Yeh Sheng Logo">
        </div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Sorry, the page you're looking for doesn't exist or has been moved. Let's get you back on track!</p>
        <div class="buttons">
            <a href="/" class="btn-primary">Go to Home</a>
            <a href="/products.html" class="btn-secondary">Browse Products</a>
        </div>
    </div>
</body>
</html>
